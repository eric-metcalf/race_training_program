services:
  postgres:
    image: postgres:16-alpine
    container_name: race-training-postgres
    environment:
      POSTGRES_DB: training
      POSTGRES_USER: training
      POSTGRES_PASSWORD: training
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U training -d training"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
